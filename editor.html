<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Liturgy Guide Editor</title>
<link rel="stylesheet" href="assets/document.css">
<link rel="stylesheet" href="assets/editor.css">
<!-- Ícones: Material Symbols Outlined (Google) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
</head>
<body>

<div class="toolbar" id="toolbar">
  <button id="btn-edit" type="button">
    <span class="mi">edit</span>Editar
  </button>

  <button type="button" id="btn-print">
    <span class="mi">print</span>Imprimir
  </button>

  <button type="button" id="btn-save" title="Sobrescreve boletim.html com a versão atual (requer servidor)">
    <span class="mi">save</span>Salvar no Original
  </button>

  <button type="button" class="secondary" id="btn-upload" title="Carrega um arquivo .html de boletim">
    <span class="mi">upload_file</span>Carregar HTML
  </button>

  <div class="dropdown" id="dl-dropdown">
    <button type="button" class="secondary" id="btn-download-toggle">
      <span class="mi">download</span>Baixar
      <span class="mi caret">arrow_drop_down</span>
    </button>
    <div class="dropdown-menu">
      <button type="button" id="dl-html">
        <span class="mi">code</span>HTML
      </button>
      <button type="button" id="dl-pdf">
        <span class="mi">picture_as_pdf</span>PDF
      </button>
    </div>
  </div>

  <!--
    Toggle de tema desativado.
    Pra reativar: descomenta o botão abaixo + os 3 trechos marcados em editor.js
    com "TEMA — descomenta pra reativar".
  -->
  <!--
  <button type="button" class="ghost icon-only" id="btn-theme" title="Alternar tema claro/escuro">
    <span class="mi" id="theme-icon">dark_mode</span>
  </button>
  -->

  <button type="button" class="ghost" id="btn-reset" title="Apaga edições salvas e restaura o conteúdo original">
    <span class="mi">restart_alt</span>Resetar
  </button>

  <input type="file" id="file-input" accept=".html,.htm,text/html" style="display:none">
  <span class="status" id="status"></span>
</div>

<!-- Popup flutuante de formatação — aparece perto da seleção -->
<div class="format-popup" id="format-popup" role="toolbar" aria-label="Formatação">
  <div class="popup-row">
    <button type="button" class="fmt" data-cmd="bold" title="Negrito (Cmd/Ctrl+B)">
      <span class="mi only">format_bold</span>
    </button>
    <button type="button" class="fmt" data-cmd="italic" title="Itálico (Cmd/Ctrl+I)">
      <span class="mi only">format_italic</span>
    </button>
    <button type="button" class="fmt" data-cmd="underline" title="Sublinhado (Cmd/Ctrl+U)">
      <span class="mi only">format_underlined</span>
    </button>
    <button type="button" class="fmt" data-cmd="superscript" title="Sobrescrito (referência de rodapé)">
      <span class="mi only">superscript</span>
    </button>
    <div class="popup-dropdown" id="align-dropdown">
      <button type="button" class="fmt align-toggle" id="align-toggle" title="Alinhamento do parágrafo">
        <span class="mi only">format_align_left</span>
      </button>
      <div class="popup-dropdown-menu" role="menu">
        <button type="button" class="fmt" data-cmd="justifyLeft" title="Alinhar à esquerda">
          <span class="mi only">format_align_left</span>
        </button>
        <button type="button" class="fmt" data-cmd="justifyCenter" title="Centralizar">
          <span class="mi only">format_align_center</span>
        </button>
        <button type="button" class="fmt" data-cmd="justifyRight" title="Alinhar à direita">
          <span class="mi only">format_align_right</span>
        </button>
        <button type="button" class="fmt" data-cmd="justifyFull" title="Justificar">
          <span class="mi only">format_align_justify</span>
        </button>
      </div>
    </div>
    <span class="popup-divider"></span>
    <button type="button" class="fmt" data-cmd="insertOrderedList" title="Lista numerada">
      <span class="mi only">format_list_numbered</span>
    </button>
    <button type="button" class="fmt" data-cmd="insertUnorderedList" title="Lista com marcadores">
      <span class="mi only">format_list_bulleted</span>
    </button>
    <button type="button" class="fmt" id="btn-refrain" title="Alternar estrofe entre número e refrão (R.)">R.</button>
  </div>

  <div class="popup-row spacing-control" id="lyric-spacing">
    <span class="mi only spacing-icon" title="Espaçamento abaixo do parágrafo">format_line_spacing</span>
    <button type="button" class="fmt" id="spacing-minus" title="Diminuir espaçamento">−</button>
    <span class="spacing-value" id="spacing-value">—</span>
    <button type="button" class="fmt" id="spacing-plus" title="Aumentar espaçamento">+</button>
  </div>

  <div class="popup-row verse-number-control" id="verse-number-row">
    <span class="mi only spacing-icon" title="Número manual da estrofe">format_list_numbered</span>
    <input type="number" id="verse-number-input" class="verse-number-input" min="1" max="99" placeholder="auto" title="Digite um número para sobrescrever, ou deixe vazio para contagem automática">
    <button type="button" class="fmt" id="verse-number-clear" title="Voltar pra contagem automática">×</button>
  </div>
</div>

<div id="document-host"></div>

<script src="assets/editor.js"></script>

</body>
</html>
